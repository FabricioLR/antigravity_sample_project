version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    container_name: web_storage_app_prod
    restart: always
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db_prod
      - DB_PORT=5432
      - DB_DATABASE=${PROD_DB_NAME:-web_storage_prod}
      - DB_USERNAME=${PROD_DB_USER:-admin}
      - DB_PASSWORD=${PROD_DB_PASS:-secret_prod}
    depends_on:
      - db_prod
    volumes:
      - prod_storage:/var/www/html/storage  # Persist storage, isolate code

  web:
    image: nginx:alpine
    container_name: web_storage_nginx_prod
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./public:/var/www/html/public:ro # Read-only public files
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  db_prod:
    image: postgres:15-alpine
    container_name: web_storage_db_prod
    restart: always
    environment:
      POSTGRES_DB: ${PROD_DB_NAME:-web_storage_prod}
      POSTGRES_USER: ${PROD_DB_USER:-admin}
      POSTGRES_PASSWORD: ${PROD_DB_PASS:-secret_prod}
    volumes:
      - prod_postgres_data:/var/lib/postgresql/data

volumes:
  prod_postgres_data:
  prod_storage:
