server {
    listen 1234 ssl;
    index index.php index.html;
    server_name server1.fabriciolr.online;
    ssl_certificate /etc/nginx/cert/fullchain1.pem;
    ssl_certificate_key /etc/nginx/cert/privkey1.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
    root /var/www/html/public;
    client_max_body_size 100M;

    # Bloqueia acesso direto a pastas internas, por garantia
    location ^~ /src/ {
        deny all;
        return 404;
    }

    location ^~ /storage/ {
        deny all;
        return 404;
    }
    
    location ^~ /tests/ {
        deny all;
        return 404;
    }

    # Redireciona tudo que não existe para o index.php (caso usassemos rotas, mas será padrão)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
}
