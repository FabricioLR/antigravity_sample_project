version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.dev
    container_name: web_storage_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=web_storage
      - DB_USERNAME=admin
      - DB_PASSWORD=secret
    command: /bin/bash -c "mkdir -p /var/www/html/storage && chmod -R 777 /var/www/html/storage && php-fpm"
    depends_on:
      - db


  web:
    image: nginx:alpine
    container_name: web_storage_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: postgres:15-alpine
    container_name: web_storage_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: web_storage
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    volumes:
      - default_postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  default_postgres_data:
